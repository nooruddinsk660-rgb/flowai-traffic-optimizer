version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEMO_MODE=true
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  mock_vision:
    build:
      context: ./backend
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - VIDEO_SOURCE=0
      - INTERSECTION_ID=CP_01
    depends_on:
      - redis
    command: python vehicle_counter.py
